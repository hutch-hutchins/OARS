name: Release

on:
  push:
    tags: ['v[0-9]+.*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oars.exe
            archive: oars-windows-x86_64.zip

          - os: macos-13          # Intel runner
            target: x86_64-apple-darwin
            binary: oars
            archive: oars-macos-intel.tar.gz

          - os: macos-latest      # ARM runner (M1/M2)
            target: aarch64-apple-darwin
            binary: oars
            archive: oars-macos-arm.tar.gz

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: oars
            archive: oars-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux: headers required by egui/eframe (X11, Wayland, udev, GTK for rfd)
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev \
            libwayland-dev libudev-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" \
            "${{ matrix.binary }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

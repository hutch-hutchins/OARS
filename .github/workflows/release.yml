name: Release

on:
  push:
    tags: ['v[0-9]+.*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oars.exe
            archive: oars-windows-x86_64.zip

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: oars
            archive: oars-macos-arm.tar.gz

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: oars
            archive: oars-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux: headers required by egui/eframe
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev \
            libwayland-dev libudev-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" staging\
          Copy-Item -Recurse examples\asm staging\examples
          Compress-Archive -Path staging\* -DestinationPath "${{ matrix.archive }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          cp -r examples/asm staging/examples
          tar czf "${{ matrix.archive }}" -C staging .

      # Each build job creates/updates the release directly so there is no
      # separate release job that can get stuck waiting on slow runners.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
          fail_on_unmatched_files: true
